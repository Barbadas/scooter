<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scooters Île de Ré - Suivi interactif</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container-fluid py-4">

    <h1 class="display-5 fw-bold mb-4"><i class="fas fa-motorcycle text-primary"></i> Scooters Île de Ré</h1>
    <p class="lead text-muted mb-5">Suivi et gestion des locations en temps réel</p>

    <!-- Statistiques -->
    <div class="row g-3 mb-5">

      <div class="col-md-3">
        <div class="card h-100 shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-check-circle text-success fs-1 mb-3"></i>
            <h2 class="fw-bold text-success" id="stat-dispo">3/6</h2>
            <p>Disponibles</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-euro-sign text-warning fs-1 mb-3"></i>
            <h2 class="fw-bold text-warning" id="stat-ca">275€</h2>
            <p>CA Total</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-battery-full text-primary fs-1 mb-3"></i>
            <h2 class="fw-bold text-primary">78%</h2>
            <p>Moyenne batterie</p>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card h-100 shadow">
          <div class="card-body text-center p-4">
            <i class="fas fa-map-marker-alt text-info fs-1 mb-3"></i>
            <h2 class="fw-bold text-info" id="stat-total">6</h2>
            <p>Scooters</p>
          </div>
        </div>
      </div>

    </div>

    <!-- Tableau flotte interactive -->
    <div class="card shadow mb-5">
      <div class="card-header bg-primary text-white">
        <h3 class="mb-0"><i class="fas fa-list"></i> Flotte en temps réel</h3>
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Scooter</th>
              <th>Statut</th>
              <th>Batterie</th>
              <th>Lieu</th>
              <th>Maintenance</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="scooters-table">
            <!-- Les lignes sont générées par JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Bouton de réinitialisation (optionnel) -->
    <div class="text-center mt-3">
      <button id="reset-defaults" class="btn btn-sm btn-outline-secondary">Réinitialiser à l’état de base</button>
    </div>

    <!-- Footer -->
    <footer class="mt-5 pt-4 border-top text-center text-muted">
      <small>
        © 2026 Kévin Randazzo | Scooters Île de Ré | Powered by Perplexity
      </small>
    </footer>

  </div>

  <!-- Script de gestion des scooters -->
  <script>
    const defaultScooters = [
      { id: 1, nom: "Scoot1", statut: "disponible", batterie: 85, localisation: "Saint-Martin", maintenance: "2026-04-01" },
      { id: 2, nom: "Scoot2", statut: "en location", batterie: 60, localisation: "Ars-en-Ré", maintenance: "2026-04-15" },
      { id: 3, nom: "Scoot3", statut: "maintenance", batterie: 45, localisation: "La Flotte", maintenance: "2026-04-20" },
      { id: 4, nom: "Scoot4", statut: "disponible", batterie: 92, localisation: "Rivedoux", maintenance: "2026-04-10" },
      { id: 5, nom: "Scoot5", statut: "disponible", batterie: 78, localisation: "Ste-Marie", maintenance: "2026-04-05" },
      { id: 6, nom: "Scoot6", statut: "en location", batterie: 70, localisation: "Loix", maintenance: "2026-04-25" }
    ];

    function loadScooters() {
      const json = localStorage.getItem("scooters");
      return json ? JSON.parse(json) : [...defaultScooters];
    }

    function saveScooters(scooters) {
      localStorage.setItem("scooters", JSON.stringify(scooters));
    }

    // Charger les scooters
    let scooters = loadScooters();

    // Mettre à jour l’affichage
    function renderTable() {
      const tbody = document.getElementById("scooters-table");
      tbody.innerHTML = "";

      let dispo = 0, enLocation = 0, total = scooters.length;

      scooters.forEach(s => {
        const tr = document.createElement("tr");
        const statutClass = s.statut === "disponible"
          ? "table-success"
          : s.statut === "en location"
          ? "table-warning"
          : "table-danger";

        const buttonText = s.statut === "disponible"
          ? "Louer"
          : s.statut === "en location"
          ? "Rendre"
          : "Rendre";

        tr.classList.add(statutClass);

        tr.innerHTML = `
          <td>${s.id}</td>
          <td><strong>${s.nom}</strong></td>
          <td><span class="badge bg-${s.statut === "disponible" ? "success" : s.statut === "en location" ? "warning" : "danger"}">${s.statut.charAt(0).toUpperCase() + s.statut.slice(1)}</span></td>
          <td>${s.batterie}%</td>
          <td>${s.localisation}</td>
          <td>${s.maintenance}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary cta-btn" data-id="${s.id}" data-action="toggle">
              ${buttonText}
            </button>
            <button class="btn btn-sm cta-maint ms-1" data-id="${s.id}" data-action="maint">
              Maintenance
            </button>
          </td>
        `;
        tbody.appendChild(tr);

        if (s.statut === "disponible") dispo++;
        if (s.statut === "en location") enLocation++;
      });

      // Mettre à jour les stats
      document.getElementById("stat-dispo").textContent = `${dispo}/${total}`;
      document.getElementById("stat-total").textContent = total;
    }

    // Gestion des clics
    document.addEventListener("click", (e) => {
      if (e.target.matches(".cta-btn")) {
        const id = parseInt(e.target.dataset.id);
        const scooter = scooters.find(s => s.id === id);
        if (!scooter) return;

        if (scooter.statut === "disponible") {
          scooter.statut = "en location";
        } else if (scooter.statut === "en location") {
          scooter.statut = "disponible";
        }
      } else if (e.target.matches(".cta-maint")) {
        const id = parseInt(e.target.dataset.id);
        const scooter = scooters.find(s => s.id === id);
        if (!scooter) return;

        scooter.maintenance = new Date().toISOString().slice(0, 10);
        scooter.statut = "maintenance";
      } else if (e.target.id === "reset-defaults") {
        localStorage.removeItem("scooters");
        scooters = [...defaultScooters];
      }

      saveScooters(scooters);
      renderTable();
    });

    // Initialisation
    renderTable();
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
